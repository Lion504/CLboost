version: '3.8'

services:
  app:
    build: .
    container_name: clboost-app
    ports:
      - '${PORT:-8080}:8080'
    environment:
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - PORT=8080
      # Database configuration
      - DB_HOST=db
      - DB_PORT=3306
      - DB_NAME=CL_generator
      - DB_USERNAME=root
      - DB_PASSWORD=${DB_PASSWORD:-password}
      - JAVA_TOOL_OPTIONS="-Djava.net.preferIPv4Stack=true"
    volumes:
      - uploads_data:/app/uploads
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  # MariaDB database for CLI backend
  db:
    image: mariadb:10.11
    restart: unless-stopped
    environment:
      - MYSQL_ROOT_PASSWORD=${DB_PASSWORD:-password}
      - MYSQL_DATABASE=CL_generator
    ports:
      - '3306:3306'
    volumes:
      - mariadb_data:/var/lib/mysql
      - ./src/main/java/com/clbooster/app/backend/service/database/coverletter_generator_script.sql:/docker-entrypoint-initdb.d/01_schema.sql
      - ./src/main/java/com/clbooster/app/backend/service/database/user_settings.sql:/docker-entrypoint-initdb.d/02_user_settings.sql
    healthcheck:
      test: ['CMD', 'healthcheck.sh', '--connect', '--innodb_initialized']
      start_period: 10s
      interval: 10s
      timeout: 5s
      retries: 3

volumes:
  mariadb_data:
  uploads_data:
