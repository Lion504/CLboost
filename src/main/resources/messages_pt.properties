help.isCLBoosterFree=O CL Booster é realmente gratuito?
help.isCLBoosterFreeAnswer=Sim! O CL Booster é gratuito para todos os candidatos. Você pode gerar cartas de apresentação ilimitadas com nossa IA. Recursos premium como edição avançada e suporte prioritário estão disponíveis no plano Pro.
help.howAIGenerate=Como a IA gera cartas de apresentação?
help.howAIGenerateAnswer=Nossa IA analisa seu currículo e a descrição do cargo para criar cartas de apresentação personalizadas. Ela identifica habilidades-chave, experiências e valores da empresa para criar narrativas convincentes que correspondem à posição.
help.canIEdit=Posso editar a carta de apresentação gerada?
help.canIEditAnswer=Absolutamente! Após a geração, você pode editar sua carta de apresentação usando o editor integrado. Você também receberá sugestões alimentadas por IA para melhorar ainda mais sua carta.
help.whatFormats=Quais formatos de arquivo posso exportar?
help.whatFormatsAnswer=Você pode exportar sua carta de apresentação como PDF, DOCX ou texto simples. O PDF é recomendado para candidaturas, pois preserva a formatação em todos os dispositivos.
help.isDataSecure=Meus dados estão seguros?
help.isDataSecurityAnswer=Levamos a segurança de dados a sério. Seus currículos e informações pessoais são criptografados e armazenados com segurança. Nunca compartilhamos seus dados com terceiros.
help.howImproveMatch=Como melhoro minha pontuação de correspondência?
help.howImproveMatchAnswer=Para melhorar sua pontuação, certifique-se de incluir palavras-chave relevantes da descrição do cargo, destaque conquistas mensuráveis e adapte suas habilidades para corresponder aos requisitos da posição.
