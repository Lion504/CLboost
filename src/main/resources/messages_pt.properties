# Terms of Service
terms.title=Termos de Serviço do CL Booster
terms.intro=Bem-vindo ao CL Booster! Ao usar nosso serviço, você concorda com estes termos. Por favor, leia-os com atenção.
terms.section1.title=1. Aceitação dos Termos
terms.section1.text=Ao acessar ou usar o CL Booster, você concorda em estar vinculado a estes Termos de Serviço e todas as leis e regulamentos aplicáveis. Se você não concordar com qualquer um destes termos, está proibido de usar ou acessar este serviço.
terms.section2.title=2. Licença de Uso
terms.section2.text=É concedida permissão para usar temporariamente o CL Booster para visualização transitória pessoal e não comercial apenas. Esta é a concessão de uma licença, não uma transferência de título. Sob esta licença você não pode:
terms.section2.list.item1=Modificar ou copiar os materiais
terms.section2.list.item2=Usar os materiais para qualquer finalidade comercial
terms.section2.list.item3=Tentar descompilar ou fazer engenharia reversa de qualquer software
terms.section2.list.item4=Remover quaisquer direitos autorais ou notações proprietárias
terms.section3.title=3. Contas de Usuário
terms.section3.text=Você é responsável por manter a confidencialidade de sua conta e senha. Você concorda em aceitar responsabilidade por todas as atividades que ocorram sob sua conta ou senha.
terms.section4.title=4. Isenção de Garantia
terms.section4.text=Os materiais no CL Booster são fornecidos "como estão". O CL Booster não oferece garantias, expressas ou implícitas, e por este meio desmente e nega todas as outras garantias, incluindo, sem limitação, garantias implícitas ou condições de comercialidade, adequação a um propósito específico, ou não violação de propriedade intelectual.
terms.section5.title=5. Limitações
terms.section5.text=Em nenhum caso o CL Booster ou seus fornecedores serão responsáveis por quaisquer danos decorrentes do uso ou incapacidade de usar os materiais no CL Booster.

# Privacy Policy
privacy.title=Política de Privacidade do CL Booster
privacy.intro=Sua privacidade é importante para nós. Esta Política de Privacidade explica como o CL Booster coleta, usa e protege suas informações pessoais.
privacy.section1.title=1. Informações que Coletamos
privacy.section1.text=Coletamos informações que você nos fornece diretamente, incluindo:
privacy.section1.list.item1=Informações pessoais (nome, endereço de e-mail, nome de usuário)
privacy.section1.list.item2=Dados de currículo e candidatura de emprego
privacy.section1.list.item3=Dados de uso e análise
privacy.section1.list.item4=Informações do dispositivo e navegador
privacy.section2.title=2. Como Usamos Suas Informações
privacy.section2.text=Usamos as informações que coletamos para:
privacy.section2.list.item1=Fornecer e manter nossos serviços
privacy.section2.list.item2=Gerar cartas de apresentação personalizadas
privacy.section2.list.item3=Melhorar e otimizar nossa plataforma
privacy.section2.list.item4=Comunicar com você sobre atualizações e recursos
privacy.section2.list.item5=Proteger contra fraude e abuso
privacy.section3.title=3. Segurança dos Dados
privacy.section3.text=Implementamos medidas técnicas e organizacionais apropriadas para proteger seus dados pessoais contra acesso não autorizado, alteração, divulgação ou destruição. Todas as senhas são hashadas com segurança usando criptografia padrão da indústria.
privacy.section4.title=4. Retenção de Dados
privacy.section4.text=Retemos suas informações pessoais enquanto sua conta estiver ativa ou conforme necessário para fornecer serviços a você. Você pode solicitar exclusão de sua conta e dados associados a qualquer momento entrando em contato conosco.
privacy.section5.title=5. Serviços de Terceiros
privacy.section5.text=Podemos usar serviços de terceiros para hospedagem, análise e processamento de IA. Esses serviços têm suas próprias políticas de privacidade e encorajamos você a lê-los.
privacy.section6.title=6. Seus Direitos
privacy.section6.text=Você tem o direito de acessar, corrigir ou excluir suas informações pessoais. Você também pode objetar ou restringir determinados processamentos de seus dados. Entre em contato conosco em privacy@clbooster.com para quaisquer solicitações relacionadas à privacidade.
privacy.section7.title=7. Alterações Desta Política
privacy.section7.text=Podemos atualizar esta Política de Privacidade de tempos em tempos. Notificaremos você sobre quaisquer alterações publicando a nova política nesta página e atualizando a data de eficácia.

