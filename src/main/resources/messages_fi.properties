# Terms of Service
terms.title=CL Booster Käyttöehdot
terms.into=Tervetuloa CL Boosteriin! Käyttämällä palveluamme hyväksyt nämä ehdot. Lue ne huolellisesti.
terms.section1.title=1. Ehdotten hyväksyminen
terms.section1.text=Käyttämällä CL Boosteria sitoudut noudattamaan näitä käyttöehtoja ja kaikkia sovellettavia lakeja ja määräyksiä. Jos et hyväksy näitä ehtoja, sinua on kiellettävä käyttämästä tai päästämästä palveluun.
terms.section2.title=2. Käyttölupa
terms.section2.text=Lupa käyttää CL Boosteria väliaikaisesti vain henkilökohtaiseen, ei-kaupalliseen katseluun. Tämä on luvan myöntäminen, ei omistuksen siirto. Tällä lisenssillä et saa:
terms.section2.list.item1=Muuttaa tai kopioida materiaalia
terms.section2.list.item2=Käyttää materiaalia kaupallisiin tarkoituksiin
terms.section2.list.item3=Yrittää dekompiloida tai kääntää ohjelmistoa
terms.section2.list.item4=Poistaa tekijänoikeus- tai omistustiedotteet
terms.section3.title=3. Käyttäjätilit
terms.section3.text=Olet vastuussa tilisi ja salasanasi luottamuksellisuuden ylläpitämisestä. Sitoudut olemaan vastuussa kaikista tilisi tai salasanasi alla tapahtuvista toiminnoista.
terms.section4.title=4. Vastuuvapauslauseke
terms.section4.text=Materiaalit CL Boosterissa toimitetaan 'sellaisinaan'. CL Booster ei anna takuita, ilmeneviä tai oletettuja, ja tällä kieltää ja nekaa kaikki muut takuut mukaan lukien, rajoituksetta, oletetut takuut tai edellytykset myyntikelpoisuudesta, sopivuudesta tiettyyn tarkoitukseen tai tekijänoikeuksien loukkaamattomuudesta.
terms.section5.title=5. Rajoitukset
terms.section5.text=CL Booster tai sen toimittajat eivät missään tapauksessa ota vastuuta vahingoista, jotka aiheutuvat materiaalien käytöstä tai käyttökyvyttömyydestä CL Boosterissa.

# Privacy Policy
privacy.title=CL Booster Tietosuojakäytäntö
privacy.intro=Yksityisyytesi on meille tärkeää. Tämä tietosuojakäytäntö selittää, miten CL Booster kerää, käyttää ja suojaa henkilötietojasi.
privacy.section1.title=1. Keräämämme tiedot
privacy.section1.text=Keräämme sinulta suoraan antamia tietoja, mukaan lukien:
privacy.section1.list.item1=Henkilötiedot (nimi, sähköpostiosoite, käyttäjätunnus)
privacy.section1.list.item2=Ansioluettelo- ja työhakutiedot
privacy.section1.list.item3=Käyttödata ja analytiikka
privacy.section1.list.item4=Laitteen ja selaimen tiedot
privacy.section2.title=2. Miten käytämme tietojasi
privacy.section2.text=Keräämiämme tietoja käytetään:
privacy.section2.list.item1=Palveluidemme tarjoamiseen ja ylläpitämiseen
privacy.section2.list.item2=Personoitujen ansioluetteloiden generointiin
privacy.section2.list.item3=Alustamme parantamiseen ja optimoimiseen
privacy.section2.list.item4= Kommunikoimaan sinulle päivityksistä ja ominaisuuksista
privacy.section2.list.item5=Suojaamaan petoksia ja väärinkäyttöä vastaan
privacy.section3.title=3. Tietoturva
privacy.section3.text=Panostamme asianmukaisia teknisiä ja organisatorisia toimenpiteitä suojamaan henkilötietojasi luvattomalta pääsyltä, muutokselta, julkisuudelta tai tuhoutumiselta. Kaikki salasanat salatataan turvallisesti alan standardien salaustekniikoilla.
privacy.section4.title=4. Tietojen säilytys
privacy.section4.text=Säilytämme henkilötietojasi niin kauan kuin tilisi on aktiivinen tai tarvitsemme niitä palvelujen tarjoamiseen. Voit pyytää tilisi ja siihen liittyvien tietojen poistamista milloin tahansa ottamalla yhteyttä meihin.
privacy.section5.title=5. Kolmannen osapuolen palvelut
privacy.section5.text=Saattamme käyttää kolmannen osapuolen palveluita isännöintiin, analytiikkaan ja tekoälyprosessointiin. Näillä palveluilla on omat tietosuojakäytäntönsä ja kannustamme sinua lukemaan ne.
privacy.section6.title=6. Oikeutesi
privacy.section6.text=Sinulla on oikeus käydä käsiksi, korjata tai poistaa henkilötietojasi. Voit myös vastustaa tai rajoittaa tiettyjä tietojesi käsittelyjä. Ota yhteyttä privacy@clbooster.com kaikista tietosuojaan liittyvistä pyynnöistä.
privacy.section7.title=7. Muutokset käytäntöön
privacy.section7.text=Saattamme päivittää tätä tietosuojakäytäntöä aika ajoin. Ilmoitamme sinulle muutoksista julkaisemalla uusi käytäntö tällä sivulla ja päivittämällä voimaantulopäivämäärän.
