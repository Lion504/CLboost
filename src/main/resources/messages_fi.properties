landing.pasteJobDescription=Liitä työkuvaus
landing.pasteJobDescriptionDesc=Kopioi ja liitä työilmoitus, johon haet. Poimimme keskeiset vaatimukset ja yrityksen tiedot.
landing.generateDownload=Generoi & Lataa
landing.generateDownloadDesc=Tekoälymme luo räätälöidyn ansioluettelon sekunneissa. Muokkaa tarvittaessa ja lataa PDF:nä tai kopioi leikepöydälle.
landing.getStarted=Aloita
landing.faqIsFree=Onko se todella ilmainen?
landing.faqIsFreeAnswer=Kyllä, Cover Booster on tällä hetkellä ilmainen kaikille työnhakijoille. Missiomme on demokratisoida laadukkaat työhakutyökalut.
landing.faqHowAi=Miten tekoäly toimii?
landing.faqHowAiAnswer=Käytämme edistyneitä kielimalleja, jotka on erityisesti viritetty uravaljennukseen. Ristiviittaamme ansioluettelosi työkuvausta vasten löytääksemme vaikuttavimmat yhteneväisyydet.
landing.faqDataSafe=Onko tietoni turvassa?
landing.faqDataSafeAnswer=Täysin. Salakoodaamme kaikki ladatut ansioluettelot emmekä myy henkilötietojasi kolmansille osapuolille. Yksityisyytesi on prioriteettimme.
landing.faqMultipleResumes=Voinko käyttää useita ansioluetteloita?
landing.faqMultipleResumesAnswer=Kyllä, voit ladata jopa 5 eri versiota ansioluettelostasi eri rooleihin (esim. Suunnittelu vs. Johtaminen).

# Help View
help.howCanWeHelp=Miten voimme auttaa?
help.searchKnowledgeBase=Etsi tietokannastamme tai selaa kategorioita alla
help.gettingStarted=Aloittaminen
help.accountBilling=Laskutus ja tilit
help.aiFeatures=AI-ominaisuudet
help.exportShare=Vie ja jaa
help.faqTitle=Usein kysytyt kysymykset
help.isCLBoosterFree=Onko CL Booster todella ilmainen?
help.isCLBoosterFreeAnswer=Kyllä! CL Booster on ilmainen kaikille työnhakijoille. Voit generoida rajattoman määrän ansioluetteloita tekoälyllämme. Premium-ominaisuudet, kuten edistynyt muokkaus ja prioriteettituki, ovat saatavilla Pro-paketissa.
help.howAIGenerate=Miten tekoäly generoi ansioluetteloita?
help.howAIGenerateAnswer=Tekoälymme analysoi ansioluettelosi ja työilmoituksen luodakseen personoituja ansioluetteloita. Se tunnistaa keskeiset taidot, kokemukset ja yrityksen arvot luodakseen vakuuttavia tarinoita, jotka vastaavat työpaikkaa.
help.canIEdit=Voinko muokata generoitua ansioluetteloa?
help.canIEditAnswer=Tietenkin! Generoinnin jälkeen voit muokata ansioluetteloa sisäänrakennetulla editorilla. Saat myös tekoälypohjaisia ehdotuksia parantamaan kirjettäsi edelleen.
help.whatFormats=Mitä tiedostomuotoja voin viedä?
help.whatFormatsAnswer=Voit viedä ansioluettelosi PDF-, DOCX- tai tekstitiedostona. PDF suositellaan työhakemuksiin, koska se säilyttää muotoilun kaikilla laitteilla.
help.isDataSecure=Onko tietoni turvassa?
help.isDataSecurityAnswer=Otamme dataturvallisuuden vakavasti. Ansioluettelosi ja henkilökohtaiset tietosi salataan ja tallennetaan turvallisesti. Emme koskaan jaa tietojasi kolmansille osapuolille.
help.howImproveMatch=Miten parannen vastaavuuspistettäni?
help.howImproveMatchAnswer=Parantaaksesi vastaavuuspistettäsi, varmista että sisällytät relevantteja avainsanoja työkuvauksesta, korostat mitattavissa olevia saavutuksia ja räätälöit taitosi vastaamaan tehtävän vaatimuksia.
