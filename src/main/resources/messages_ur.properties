# Terms of Service
terms.title=CL Booster سروس کی شرائط
terms.intro=CL Booster میں خوش آمدید! ہماری سروس کا استعال کرتے ہوئے، آپ ان شرائط سے متفق ہو جاتے ہیں۔ براہ کرم انہیں دھیان سے پڑھیں۔
terms.section1.title=1. شرائط کی قبولیت
terms.section1.text=CL Booster تک رسائی یا استعال کرتے ہوئے، آپ ان سروس کی شرائط اور تمام قابل اطلاق قوانین اور ضوابط سے پابند ہونے پر متفق ہو جاتے ہیں۔ اگر آپ ان شرائط میں سے کسی سے متفق نہیں ہیں، تو اس سروس کو استعال یا رسائی سے منع کیا گیا ہے۔
terms.section2.title=2. لائسنس کا Grant
terms.section2.text=CL Booster کو صرف دیکھنے کے لیے عارضی طور پر ذاتی، غیر تجارتی استعال کرنے کی اجازت دی جاتی ہے۔ یہ ایک لائسنس کا grant ہے، عنوان کا منتقلی نہیں۔ اس لائیسنس کے تحت آپ یہ نہیں کر سکتے:
terms.section2.list.item1=مواد کو modify یا copy کریں
terms.section2.list.item2=مواد کو کسی تجارتی مقصد کے لیے استعال کریں
terms.section2.list.item3=کسی سافٹویئر کو decompile یا reverse engineer کرنے کی کوشش کریں
terms.section2.list.item4=کسی copyright یا proprietary notations کو remove کریں
terms.section3.title=3. صارف اکاؤنٹس
terms.section3.text=آپ اپنے اکاؤنٹ اور پاس ورڈ کی رازداری برقرار رکھنے کے ذمہ دار ہیں۔ آپ اپنے اکاؤنٹ یا پاس ورڈ کے under ہونے والی تمام activities کی ذمہ داری قبول کرنے پر متفق ہو جاتے ہیں۔
terms.section4.title=4. DISCLAIMER
terms.section4.text=CL Booster پر مواد "جیسا ہے" کی بنیاد پر فراہم کیا جاتا ہے۔ CL Booster کوئی guarantees، واضح یا ضمنی، نہیں دیتا اور اس طرح تمام دیگر guarantees کو مسترد کرتا ہے۔
terms.section5.title=5. LIMITATIONS
terms.section5.text=کسی بھی صورت میں CL Booster یا اس کے suppliersمواد کے استعال یا استعال نہ کر پانے کی وجہ سے ہونے والے کسی بھی damages کے لیے ذمہ دار نہیں ہوں گے۔

# Privacy Policy
privacy.title=CL Booster رازداری کی پالیسی
privacy.intro=آپ کی رازداری ہمارے لیے اہم ہے۔ یہ رازداری کی پالیسی بیان کرتی ہے کہ CL Booster آپ کی ذاتی معلومات کیسے جمع، استعال، اور محفوظ کرتا ہے۔
privacy.section1.title=1. جو معلومات ہم جمع کرتے ہیں
privacy.section1.text=ہم وہ معلومات جمع کرتے ہیں جو آپ براہ راست ہمیں دیتے ہیں، بشمول:
privacy.section1.list.item1=ذاتی معلومات (نام، ای میل پتہ، صارف نام)
privacy.section1.list.item2=ریزیومے اور ملازمت کی درخواست کا ڈیٹا
privacy.section1.list.item3=استعمال ڈیٹا اور تجزیہ
privacy.section1.list.item4=ڈیوائس اور browser کی معلومات
privacy.section2.title=2. ہم آپ کی معلومات کیسے استعال کرتے ہیں
privacy.section2.text=ہم جو معلومات جمع کرتے ہیں اسے ان مقاصد کے لیے استعال کرتے ہیں:
privacy.section2.list.item1=ہماری سروسز فراہم اور برقرار رکھنا
privacy.section2.list.item2=ذاتی نوعیت کے کور لیٹر جنریٹ کرنا
privacy.section2.list.item3=ہمارے پلیٹ فارم کو بہتر بنانا اور optimize کرنا
privacy.section2.list.item4=آپ سے updates اور features کے بارے میں رابطہ کرنا
privacy.section2.list.item5=فراڈ اور غلط استعال سے بچاؤ
privacy.section3.title=3. ڈیٹا سیکورٹی
privacy.section3.text=ہم آپ کے ذاتی ڈیٹا کو غیر مجاز access، تبدیلی، انکشاف، یا تباہی کے خلاف بچانے کے لیے appropriate technical اور organizational measures نافذ کرتے ہیں۔ تمام پاس ورڈز کو industry-standard encryption کا استعال کرتے ہوئے محفوظ طریقے سے hash کیا جاتا ہے۔
privacy.section4.title=4. ڈیٹا Retention
privacy.section4.text=ہم آپ کی ذاتی معلومات کو جب تک آپ کا اکاؤنٹ فعال ہے یا جتنا ضروری ہے آپ کو سروسز فراہم کرنے کے لیے رکھتے ہیں۔ آپ کسی بھی وقت ہم سے رابطہ کرکے اپنے اکاؤنٹ اور متعلقہ ڈیٹا کی حذف کی درخواست کر سکتے ہیں۔
privacy.section5.title=5. Third-Party Services
privacy.section5.text=ہم میزبانی، تجزیہ، اور AI پراسیسنگ کے لیے third-party services کا استعال کر سکتے ہیں۔ ان services کی اپنی رازداری کی پالیسیز ہیں اور ہم آپ کو انہیں پڑھنے کی ترغیب دیتے ہیں۔
privacy.section6.title=6. آپ کے حقوق
privacy.section6.text=آپ کو اپنی ذاتی معلومات تک رسائی، درست، یا حذف کرنے کا حق ہے۔ آپ اپنے ڈیٹا کے کچھ پراسیسنگ کا اعتراض بھی کر سکتے ہیں یا اسے محدود کر سکتے ہیں۔ رازداری سے متعلق کسی بھی درخواست کے لیے privacy@clbooster.com پر ہم سے رابطہ کریں۔
privacy.section7.title=7. اس پالیسی میں تبدیلیاں
privacy.section7.text=ہم اس رازداری کی پالیسی کو وقتاً فوقتاً update کر سکتے ہیں۔ ہم کسی بھی تبدیلی کے بارے میں اس page پر نیا policy post کرکے اور effective date update کرکے آپ کو مطلع کریں گے۔

