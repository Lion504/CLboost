# Terms of Service
terms.title=CL Booster服务条款
terms.intro=欢迎使用CL Booster！使用我们的服务即表示您同意这些条款。请仔细阅读。
terms.section1.title=1. 条款接受
terms.section1.text=通过访问或使用CL Booster，您同意受这些服务条款和所有适用法律和法规的约束。如果您不同意任何这些条款，您被禁止使用或访问此服务。
terms.section2.title=2. 使用许可
terms.section2.text=授予您临时仅为个人、非商业目的观看使用CL Booster的权利。这是许可的授予，而非所有权的转让。在此许可下，您不得：
terms.section2.list.item1=修改或复制材料
terms.section2.list.item2=将材料用于任何商业目的
terms.section2.list.item3=试图反编译或逆向工程任何软件
terms.section2.list.item4=移除任何版权或专有声明
terms.section3.title=3. 用户账户
terms.section3.text=您有责任维护账户和密码的机密性。您同意对您账户或密码下发生的所有活动承担责任。
terms.section4.title=4. 免责声明
terms.section4.text=CL Booster上的材料按"原样"提供。CL Booster不提供任何明示或暗示的保证，特此声明并否认所有其他保证，包括但不限于适销性、特定用途适用性或知识产权非侵权的暗示保证或条件。
terms.section5.title=5. 限制
terms.section5.text=在任何情况下，CL Booster或其供应商均不对因使用或无法使用CL Booster上的材料而导致的任何损害承担责任。

# Privacy Policy
privacy.title=CL Booster隐私政策
privacy.intro=您的隐私对我们很重要。本隐私政策解释了CL Booster如何收集、使用和保护您的个人信息。
privacy.section1.title=1. 我们收集的信息
privacy.section1.text=我们收集您直接提供给我们的信息，包括：
privacy.section1.list.item1=个人信息（姓名、电子邮件地址、用户名）
privacy.section1.list.item2=简历和求职数据
privacy.section1.list.item3=使用数据和analytics
privacy.section1.list.item4=设备和浏览器信息
privacy.section2.title=2. 我们如何使用您的信息
privacy.section2.text=我们收集的信息用于：
privacy.section2.list.item1=提供和维护我们的服务
privacy.section2.list.item2=生成个性化求职信
privacy.section2.list.item3=改进和优化我们的平台
privacy.section2.list.item4=与您沟通更新和功能
privacy.section2.list.item5=防止欺诈和滥用
privacy.section3.title=3. 数据安全
privacy.section3.text=我们实施适当的技术和组织措施，保护您的个人数据免受未经授权的访问、更改、公开或销毁。所有密码均使用行业标准加密技术安全哈希。
privacy.section4.title=4. 数据保留
privacy.section4.text=只要您的账户处于活动状态或需要我们提供服务，我们就会保留您的个人信息。您可以随时联系我们要求删除您的账户和相关数据。
privacy.section5.title=5. 第三方服务
privacy.section5.text=我们可能使用第三方服务进行托管、分析和AI处理。这些服务有自己的隐私政策，我们鼓励您阅读它们。
privacy.section6.title=6. 您的权利
privacy.section6.text=您有权访问、更正或删除您的个人信息。您也可以反对或限制您数据的某些处理。有关任何隐私相关请求，请联系privacy@clbooster.com。
privacy.section7.title=7. 本政策的变更
privacy.section7.text=我们可能会不时更新本隐私政策。我们将通过在页面上发布新政策并更新生效日期来通知您任何变更。

