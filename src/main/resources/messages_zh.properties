help.aiFeatures=AI功能
help.exportShare=导出和分享
help.faqTitle=常见问题
help.isCLBoosterFree=CL Booster真的免费吗？
help.isCLBoosterFreeAnswer=是的！CL Booster对所有求职者免费。您可以使用我们的AI生成无限数量的求职信。高级定制功能和优先支持可在专业版中获得。
help.howAIGenerate=AI如何生成求职信？
help.howAIGenerateAnswer=我们的AI会分析您的简历和职位描述，创建个性化的求职信。它会识别关键技能、经验和公司价值观，制作符合职位要求的引人入胜的内容。
help.canIEdit=我可以编辑生成的求职信吗？
help.canIEditAnswer=当然可以！生成后，您可以在内置编辑器中编辑求职信。您还可以获得AI驱动的建议，进一步改善您的求职信。
help.whatFormats=我可以导出什么文件格式？
help.whatFormatsAnswer=您可以将求职信导出为PDF、DOCX或纯文本。PDF推荐用于求职申请，因为它可以在所有设备上保持格式。
help.isDataSecure=我的数据安全吗？
help.isDataSecurityAnswer=我们非常重视数据安全。您的简历和个人信息会被加密并安全存储。我们永远不会与第三方分享您的数据。
help.howImproveMatch=如何提高我的匹配分数？
help.howImproveMatchAnswer=要提高您的匹配分数，请确保包含职位描述中的相关关键词，突出可量化的成就，并使您的技能与职位要求相匹配。
