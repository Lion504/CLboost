help.isCLBoosterFree=CL Booster真的是免费的吗？
help.isCLBoosterFreeAnswer=是的！CL Booster对所有求职者免费。您可以使用我们的AI生成无限量的求职信。高级功能（如高级编辑和优先支持）在Pro计划中可用。
help.howAIGenerate=AI是如何生成求职信的？
help.howAIGenerateAnswer=我们的AI会分析您的简历和职位描述，以创建个性化的求职信。它会识别关键技能、经验和公司价值观，以编写与职位匹配的引人入胜的叙述。
help.canIEdit=我可以编辑生成的求职信吗？
help.canIEditAnswer=当然可以！生成后，您可以使用内置编辑器编辑求职信。您还将获得AI驱动的建议，以进一步改进您的信件。
help.whatFormats=我可以导出哪些文件格式？
help.whatFormatsAnswer=您可以将求职信导出为PDF、DOCX或纯文本。PDF推荐用于求职申请，因为它可以在所有设备上保留格式。
help.isDataSecure=我的数据安全吗？
help.isDataSecurityAnswer=我们非常重视数据安全。您的简历和个人信息经过加密并安全存储。我们永远不会与第三方共享您的数据。
help.howImproveMatch=如何提高我的匹配分数？
help.howImproveMatchAnswer=要提高匹配分数，请确保包含职位描述中的相关关键词，突出可衡量的成就，并根据职位要求调整您的技能。
