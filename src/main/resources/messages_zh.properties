terms.title=CL Booster服务条款
terms.intro=欢迎使用CL Booster！使用我们的服务即表示您同意这些条款。请仔细阅读。
terms.section1.title=1. 接受条款
terms.section1.text=访问或使用CL Booster即表示您同意受这些服务条款及所有适用法律法规的约束。如果您不同意任何这些条款，则禁止使用或访问本服务。
terms.section2.title=2. 使用许可
terms.section2.text=仅授予CL Booster个人和非商业使用的临时许可，仅供查看。这是许可转让，而非产权转让。在此许可下，您不得：
terms.section2.list.item1=修改或复制材料
terms.section2.list.item2=将材料用于任何商业目的
terms.section2.list.item3=尝试对任何软件进行反向编译或逆向工程
terms.section2.list.item4=删除任何版权或专有标记
terms.section3.title=3. 用户账户
terms.section3.text=您有责任维护您的账户和密码的机密性。您同意对在您的账户或密码下发生的所有活动承担责任。
terms.section4.title=4. 免责声明
terms.section4.text=CL Booster上的材料按"原样"提供。CL Booster不提供任何明示或暗示的保证，并特此声明否认所有其他保证，包括但不限于暗示的适销性、特定用途的适用性或知识产权不侵权的保证。
terms.section5.title=5. 责任限制
terms.section5.text=在任何情况下，CL Booster或其供应商均不对因使用或无法使用CL Booster上的材料而造成的任何损失负责。

# Privacy Policy
privacy.title=CL Booster隐私政策
privacy.intro=您的隐私对我们很重要。本隐私政策解释CL Booster如何收集、使用和保护您的个人信息。
privacy.section1.title=1. 我们收集的信息
privacy.section1.text=我们收集您直接提供给我们的信息，包括：
privacy.section1.list.item1=个人信息（姓名、电子邮件、用户名）
privacy.section1.list.item2=简历和求职申请数据
privacy.section1.list.item3=使用和分析数据
privacy.section1.list.item4=设备和浏览器信息
privacy.section2.title=2. 我们如何使用您的信息
privacy.section2.text=我们收集的信息用于以下目的：
privacy.section2.list.item1=提供和维护我们的服务
privacy.section2.list.item2=生成个性化求职信
privacy.section2.list.item3=改进和优化我们的平台
privacy.section2.list.item4=与您联系以获取更新和功能
privacy.section2.list.item5=防止欺诈和滥用
privacy.section3.title=3. 数据安全
privacy.section3.text=我们实施适当的技术和组织措施来保护您的个人信息免受未经授权的访问、更改、披露或破坏。所有密码均使用行业标准加密安全地进行哈希处理。
privacy.section4.title=4. 数据保留
privacy.section4.text=我们会在您的账户活跃期间或根据需要为您提供服务的时间内保留您的个人信息。您可以随时联系我们请求删除您的账户和相关数据。
privacy.section5.title=5. 第三方服务
privacy.section5.text=我们可能会使用第三方服务进行托管、分析和AI处理。这些服务有自己的隐私政策，我们鼓励您阅读它们。
privacy.section6.title=6. 您的权利
privacy.section6.text=您有权访问、更正或删除您的个人信息。您也可以对象或限制某些数据处理。如有任何隐私相关请求，请联系我们privacy@clbooster.com。
privacy.section7.title=7. 政策变更
privacy.section7.text=我们可能会不时更新本隐私政策。我们将通过在本页发布新政策并更新生效日期来通知您任何变更。

