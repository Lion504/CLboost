server.port=${PORT:8080}
logging.level.org.atmosphere = warn
spring.mustache.check-template-location = false

# Launch the default browser when starting the application in development mode
vaadin.launch-browser=true
vaadin.whitelisted-packages=com.vaadin,org.vaadin,com.clbooster
# App
spring.application.name=CLbooster

# Theme is "my-theme" (already set in Application.java @Theme)

# AI Configuration
spring.ai.vertex.ai.gemini.api-key=${GEMINI_API_KEY:}
spring.ai.vertex.ai.gemini.chat.options.model=gemini-2.5-flash
spring.ai.vertex.ai.gemini.project-id=${GOOGLE_PROJECT_ID:}
spring.ai.vertex.ai.gemini.location=${GOOGLE_LOCATION:us-central1}


# Database Configuration
spring.datasource.url=jdbc:mariadb://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:CL_generator}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:password}
spring.datasource.driver-class-name=org.mariadb.jdbc.Driver

# File Upload Configuration
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# Disable Spring AI Vertex AI auto-config (we use LangChain4j directly)
spring.autoconfigure.exclude=org.springframework.ai.autoconfigure.vertexai.gemini.VertexAiGeminiAutoConfiguration
