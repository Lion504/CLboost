# Privacy Policy
privacy.title=CL Booster Privacy Policy
privacy.intro=Your privacy is important to us. This Privacy Policy explains how CL Booster collects, uses, and protects your personal information.
privacy.section1.title=1. Information We Collect
privacy.section1.text=We collect information you provide directly to us, including:
privacy.section1.list.item1=Personal information (name, email address, username)
privacy.section1.list.item2=Resume and job application data
privacy.section1.list.item3=Usage data and analytics
privacy.section1.list.item4=Device and browser information
privacy.section2.title=2. How We Use Your Information
privacy.section2.text=We use the information we collect to:
privacy.section2.list.item1=Provide and maintain our services
privacy.section2.list.item2=Generate personalized cover letters
privacy.section2.list.item3=Improve and optimize our platform
privacy.section2.list.item4=Communicate with you about updates and features
privacy.section2.list.item5=Protect against fraud and abuse
privacy.section3.title=3. Data Security
privacy.section3.text=We implement appropriate technical and organizational measures to protect your personal data against unauthorized access, alteration, disclosure, or destruction. All passwords are securely hashed using industry-standard encryption.
privacy.section4.title=4. Data Retention
privacy.section4.text=We retain your personal information for as long as your account is active or as needed to provide you services. You may request deletion of your account and associated data at any time by contacting us.
privacy.section5.title=5. Third-Party Services
privacy.section5.text=We may use third-party services for hosting, analytics, and AI processing. These services have their own privacy policies and we encourage you to read them.
privacy.section6.title=6. Your Rights
privacy.section6.text=You have the right to access, correct, or delete your personal information. You may also object to or restrict certain processing of your data. Contact us at privacy@clbooster.com for any privacy-related requests.
privacy.section7.title=7. Changes to This Policy
privacy.section7.text=We may update this Privacy Policy from time to time. We will notify you of any changes by posting the new policy on this page and updating the effective date.

