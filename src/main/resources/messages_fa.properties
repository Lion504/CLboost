help.isCLBoosterFree=آیا CL Booster واقعاً رایگان است؟
help.isCLBoosterFreeAnswer=بله! CL Booster برای همه جویای کار رایگان است. می‌توانید نامه‌های پوششی نامحدود با AI ما تولید کنید. ویژگی‌های پریمیوم مانند ویرایش پیشرفته و پشتیبانی اولویت‌دار در طرح Pro موجود است.
help.howAIGenerate=AI چگونه نامه‌های پوششی تولید می‌کند؟
help.howAIGenerateAnswer=AI ما رزومه و توضیحات شغل شما را تحلیل می‌کند تا نامه‌های پوششی شخصی‌سازی شده ایجاد کند. مهارت‌های کلیدی، تجربیات و ارزش‌های شرکت را شناسایی می‌کند تا روایت‌های جذابی که با موقعیت مطابقت دارد ایجاد کند.
help.canIEdit=آیا می‌توانم نامه پوششی تولید شده را ویرایش کنم؟
help.canIEditAnswer=قطعاً! پس از تولید، می‌توانید نامه پوششی خود را با ویرایشگر داخلی ویرایش کنید. همچنین پیشنهادات مبتنی بر AI برای بهبود بیشتر نامه خود دریافت خواهید کرد.
help.whatFormats=به چه فرمت‌های فایلی می‌توانم خروجی بگیرم؟
help.whatFormatsAnswer=می‌توانید نامه پوششی خود را به صورت PDF، DOCX یا متن ساده خروجی بگیرید. PDF برای درخواست‌های شغلی توصیه می‌شود زیرا قالب‌بندی را در تمام دستگاه‌ها حفظ می‌کند.
help.isDataSecure=آیا داده‌های من امن است؟
help.isDataSecurityAnswer=ما امنیت داده را جدی می‌گیریم. رزومه‌ها و اطلاعات شخصی شما رمزگذاری شده و به صورت امن ذخیره می‌شوند. ما هرگز داده‌های شما را با اشخاص ثالث به اشتراک نمی‌گذاریم.
help.howImproveMatch=چگونه امتیاز تطابق خود را بهبود دهم؟
help.howImproveMatchAnswer=برای بهبود امتیاز تطابق، حتماً کلمات کلیدی مرتبط از توضیحات شغل را شامل شوید، دستاوردهای قابل اندازه‌گیری را برجسته کنید و مهارت‌های خود را با الزامات موقعیت تطبیق دهید.
