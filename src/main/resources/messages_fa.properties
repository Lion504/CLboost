# Terms of Service
terms.title=شرایط خدمات CL Booster
terms.intro=به CL Booster خوش آمدید! با استفاده از خدمات ما، با این شرایط موافقت می‌کنید. لطفاً آنها را با دقت بخوانید.
terms.section1.title=1. پذیرش شرایط
terms.section1.text=با دسترسی یا استفاده از CL Booster، شما موافقت می‌کنید که به این شرایط خدمات و تمام قوانین و مقررات قابل اجرا پایبند باشید. اگر با هر یک از این شرایرات موافق نیستید، از استفاده یا دسترسی به این خدمات منع می‌شوید.
terms.section2.title=2. مجوز استفاده
terms.section2.text=مجوز موقت برای استفاده شخصی و غیرتجاری از CL Booster فقط برای مشاهده اعطا می‌شود. این اعطای مجوز است، نه انتقال عنوان. تحت این مجوز شما مجاز نیستید:
terms.section2.list.item1=مواد را تغییر یا کپی کنید
terms.section2.list.item2=مواد را برای هر هدف تجاری استفاده کنید
terms.section2.list.item3=تلاش برای کامپایل معکوس یا مهندسی معکوس هر نرم‌افزار
terms.section2.list.item4=هر حق چاپ یا نشانه‌های اختصاصی را حذف کنید
terms.section3.title=3. حساب‌های کاربری
terms.section3.text=شما مسئول حفظ محرمانگی حساب و رمز عبور خود هستید. شما موافقت می‌کنید که مسئولیت تمام فعالیت‌هایی که تحت حساب یا رمز عبور شما رخ می‌دهد را بپذیرید.
terms.section4.title=4. سلب مسئولیت
terms.section4.text=مواد موجود در CL Booster بر اساس "همان‌گونه که هست" ارائه می‌شود. CL Booster هیچ ضمانتی، صریح یا ضمنی، ارائه نمی‌دهد و با این حال سایر ضمانت‌ها از جمله بدون محدودیت ضمانت‌های ضمنی یا شرایط قابلیت فروش، مناسب بودن برای یک هدف خاص، یا عدم نقض مالکیت معنوی را رد می‌کند.
terms.section5.title=5. محدودیت‌ها
terms.section5.text=در هیچ صورتی CL Booster یا تأمین‌کنندگان آن مسئول هیچ گونه خسارتی ناشی از استفاده یا عدم توانایی استفاده از مواد در CL Booster نخواهند بود.

# Privacy Policy
privacy.title=سیاست حریم خصوصی CL Booster
privacy.intro=حریم خصوصی شما برای ما مهم است. این سیاست حریم خصوصی توضیح می‌دهد که CL Booster چگونه اطلاعات شخصی شما را جمع‌آوری، استفاده و محافظت می‌کند.
privacy.section1.title=1. اطلاعاتی که جمع‌آوری می‌کنیم
privacy.section1.text=ما اطلاعاتی را که مستقیماً به ما می‌دهید جمع‌آوری می‌کنیم، از جمله:
privacy.section1.list.item1=اطلاعات شخصی (نام، آدرس ایمیل، نام کاربری)
privacy.section1.list.item2=داده‌های رزومه و درخواست شغلی
privacy.section1.list.item3=داده‌های استفاده و تجزیه و تحلیل
privacy.section1.list.item4=اطلاعات دستگاه و مرورگر
privacy.section2.title=2. نحوه استفاده از اطلاعات شما
privacy.section2.text=ما از اطلاعاتی که جمع‌آوری می‌کنیم برای موارد زیر استفاده می‌کنیم:
privacy.section2.list.item1=ارائه و نگهداری خدمات ما
privacy.section2.list.item2=تولید نامه‌های پوششی شخصی
privacy.section2.list.item3=بهبود و بهینه‌سازی پلتفرم ما
privacy.section2.list.item4=ارتباط با شما در مورد به‌روزرسانی‌ها و ویژگی‌ها
privacy.section2.list.item5=محافظت در برابر تقلب و سوء استفاده
privacy.section3.title=3. امنیت داده‌ها
privacy.section3.text=ما اقدامات فنی و سازمانی مناسب را برای محافظت از داده‌های شخصی شما در برابر دسترسی، تغییر، افشا یا تخریب غیرمجاز اجرا می‌کنیم. تمام رمزهای عبور با استفاده از رمزگذاری استاندارد صنعتی به طور ایمن هش می‌شوند.
privacy.section4.title=4. نگهداری داده‌ها
privacy.section4.text=ما اطلاعات شخصی شما را تا زمانی که حساب شما فعال است یا حسب نیاز برای ارائه خدمات شما نگهداری می‌کنیم. در هر زمان می‌توانید با تماس با ما درخواست حذف حساب و داده‌های مرتبط را بدهید.
privacy.section5.title=5. خدمات شخص ثالث
privacy.section5.text=ما ممکن است از خدمات شخص ثالث برای میزبانی، تجزیه و تحلیل و پردازش هوش مصنوعی استفاده کنیم. این خدمات سیاست‌های حریم خصوصی خود را دارند و ما شما را تشویق می‌کنیم آنها را بخوانید.
privacy.section6.title=6. حقوق شما
privacy.section6.text=شما حق دسترسی، تصحیح یا حذف اطلاعات شخصی خود را دارید. همچنین می‌توانید به برخی از پردازش داده‌های خود اعتراض کنید یا آن را محدود کنید. برای هرگونه درخواست مربوط به حریم خصوصی با ما در privacy@clbooster.com تماس بگیرید.
privacy.section7.title=7. تغییرات در این سیاست
privacy.section7.text=ما ممکن است این سیاست حریم خصوصی را از زمان به زمان به‌روزرسانی کنیم. ما شما را از هرگونه تغییر با انتشار سیاست جدید در این صفحه و به‌روزرسانی تاریخ مؤثر مطلع خواهیم کرد.

